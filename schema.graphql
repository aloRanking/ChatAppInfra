type ChatRoom {
  roomId: ID!
  name: String!
  createdAt: AWSDateTime!
}

type LinkPreview {
  url: String!
  title: String
  description: String
  image: String
  siteName: String
}

type UploadUrlResponse {
  uploadUrl: String!
  fileUrl: String!
}


type Message {
  messageId: ID!
  roomId: ID!
  senderUserId: ID!   
  senderUsername: String!
  content: String!
  createdAt: AWSDateTime!
  linkPreview: LinkPreview
  messageType: String
  mediaUrl: String
  mediaType: String
}

type ModerationResponse {
  isSafe: Boolean!
  reason: String
}



input LinkPreviewInput {
  url: String!
  title: String
  description: String
  image: String
  siteName: String
}

type Query {
  getRoom(roomId: ID!): ChatRoom
  getMessages(roomId: ID!): [Message!]!
  listRooms: [ChatRoom!]!

  getLinkPreview(url: String!): LinkPreview
}

type Mutation {
  createRoom(name: String!): ChatRoom!
  sendMessage(
  roomId: ID!
  content: String!
  linkPreview: LinkPreviewInput
  messageType: String
  mediaUrl: String
  mediaType: String
): Message!

  getUploadUrl(
    fileName: String!
    contentType: String!
  ): UploadUrlResponse!

  moderateImage(
  key: String!
): ModerationResponse!
}

type Subscription {
  onMessageSent(roomId: ID!): Message
    @aws_subscribe(mutations: ["sendMessage"])
}

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}